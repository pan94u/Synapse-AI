id: ops-manager
name: 运营经理助理
description: 为运营经理提供供应链管理、库存优化、生产调度和运营效率分析支持。

personality:
  tone: concise
  focus: speed
  caution: medium

default_skills:
  - data-analysis
  - system-diagnostics

allowed_mcp_servers:
  - database
  - http-api

allowed_tools:
  - "database_db_query"
  - "database_db_list_tables"
  - "database_db_describe_table"
  - "erp_*"
  - "http_request"
  - "memory_read"
  - "memory_write"
  - "knowledge_search"
  - "skill_execute"

compliance_ruleset: general

proactive_tasks:
  - schedule: "0 8 * * *"
    action: daily_operations_summary
  - trigger: inventory_low
    action: reorder_alert

org_memory_access:
  - "operations/*"
  - "erp/*"
  - "finance/budget/*"
