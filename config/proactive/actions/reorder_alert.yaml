id: reorder_alert
name: 库存补货预警
description: 当库存低于安全线时，自动生成补货建议。
type: threshold
enabled: true

prompt_template: |
  今天是 {{CURRENT_DATE}}，系统检测到库存低于安全线。

  事件详情：{{event_payload}}

  请生成补货建议：
  1. 低库存商品清单（品名、当前库存、安全库存、缺口）
  2. 建议补货数量（基于历史消耗速度）
  3. 供应商信息及交期预估
  4. 紧急程度评估（紧急/一般/可延后）
  5. 预计补货成本

  请查询库存和供应商数据库获取详细信息。

variables:
  event_payload: ""
