id: weekly_business_summary
name: 每周经营摘要
description: 每周一自动生成高管经营周报，汇总各部门关键指标和重要事项。

prompt_template: |
  今天是 {{CURRENT_DATE}}，请生成本周经营摘要报告。

  请从以下维度汇总：
  1. 财务概况：本周收入、支出、利润变化趋势
  2. 销售业绩：新签订单、在谈商机、客户动态
  3. 运营状况：库存水平、供应链异常、生产进度
  4. 人力资源：在职人数、本周入离职、考勤异常
  5. 法务合规：合同到期提醒、合规风险提示

  请使用数据库查询获取实际数据，以结构化格式输出摘要。
  如果某些数据无法获取，请标注"数据暂不可用"。

variables:
  report_type: weekly
