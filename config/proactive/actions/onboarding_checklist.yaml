id: onboarding_checklist
name: 入职清单生成
description: 当新员工入职事件触发时，自动生成入职待办清单。
type: event
enabled: true

prompt_template: |
  今天是 {{CURRENT_DATE}}，系统检测到新员工入职事件。

  事件详情：{{event_payload}}

  请生成入职待办清单：
  1. IT 设备准备（电脑、账号开通、邮箱配置）
  2. 行政事项（工位安排、门禁卡、工牌）
  3. HR 手续（合同签署、社保公积金、银行卡信息）
  4. 部门对接（导师分配、培训计划、首周任务）
  5. 合规培训（信息安全、公司制度、保密协议）

  请查询相关系统确认各项准备状态。

variables:
  event_payload: ""
