id: deal_pipeline_alert
name: 管线健康预警
description: 分析投资管线健康状况，识别停滞项目和瓶颈阶段，生成预警报告。
type: threshold
enabled: true

prompt_template: |
  今天是 {{CURRENT_DATE}}，请分析投资管线健康状况。

  请依次调用以下工具获取数据：
  1. invest_deal_kanban — 获取管线各阶段项目分布
  2. invest_todo_items — 获取停滞项目清单
  3. invest_list_deals — 获取全部项目详情

  请基于真实数据分析以下内容：

  ## 停滞项目预警
  - 超过 30 天未推进的项目列表
  - 每个项目的停滞原因分析
  - 建议行动项

  ## 管线瓶颈分析
  - 各阶段项目数量分布
  - 识别项目堆积的阶段
  - 瓶颈原因分析

  ## 转化率分析
  - 各阶段转化率统计
  - 与历史平均对比
  - 异常转化率标记

  ## 管线健康评分
  - 综合健康度评分（0-100）
  - 各维度得分明细
  - 改善建议

  请以结构化格式输出，异常指标用警告标记。

variables:
  event_payload: ""
