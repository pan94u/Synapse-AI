vision: "成为行业领先的智能化企业"
fiscal_year: FY2026

objectives:
  - id: obj-revenue
    name: 营收增长
    target: "同比增长30%，全年营收突破1亿元"
    key_results:
      - id: kr-revenue-q1
        name: Q1完成年度目标的25%
        metric_id: revenue
        target_value: 25000000
      - id: kr-margin-maintain
        name: 毛利率维持在35%以上
        metric_id: gross_margin
        target_value: 35

  - id: obj-efficiency
    name: 运营效率提升
    target: "运营效率全面提升，费用率降低5个百分点"
    key_results:
      - id: kr-return-rate
        name: 退货率控制在3%以内
        metric_id: return_rate
        target_value: 3
      - id: kr-inventory
        name: 库存周转天数缩短至30天
        metric_id: inventory_turnover
        target_value: 30
      - id: kr-cost-ratio
        name: 综合费用率降至30%以下
        metric_id: cost_ratio
        target_value: 30

  - id: obj-customer
    name: 客户体验卓越
    target: "NPS提升至60+，客户留存率95%+"
    key_results:
      - id: kr-nps
        name: NPS达到60分
        metric_id: customer_nps
        target_value: 60
      - id: kr-new-customer
        name: 季度新客获取5000+
        metric_id: customer_acquisition
        target_value: 5000

  - id: obj-talent
    name: 人才发展
    target: "打造高满意度团队，满意度评分85+"
    key_results:
      - id: kr-satisfaction
        name: 员工满意度达到85分
        metric_id: employee_satisfaction
        target_value: 85

  - id: obj-investment
    name: 投资管理卓越
    target: "管线规模≥5亿，组合IRR≥15%，催缴完成率≥90%"
    key_results:
      - id: kr-pipeline-value
        name: 投资管线总值达到5亿元
        metric_id: deal_pipeline_value
        target_value: 50000
      - id: kr-portfolio-irr
        name: 组合IRR达到15%
        metric_id: portfolio_irr
        target_value: 15
      - id: kr-capital-call
        name: 催缴完成率达到90%
        metric_id: capital_call_completion
        target_value: 90
